name: After_long_workflow

on: 
  workflow_dispatch: 


jobs:
  terrascanning :
    name: terraform scanning 
    runs-on: ubuntu-22.04
    
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@v0.36.0
        with:
         scan-type: 'fs'
         scan-ref: '.'
 
  terraforminit:
    name: terraform init 
    runs-on: self-hosted

    steps:

     - name: checkout
       uses: actions/checkout@v4

     - name: terraforminit
       run: terraform -chdir=MODULE init
  
     - name: terraformvalidate
       run: terraform -chdir=MODULE validate
  
     - name: terraformplan
       run: terraform -chdir=MODULE plan

        

        
